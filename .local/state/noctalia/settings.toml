[dock]
auto_hide = true
enabled = true
icon_size = 36
launcher_icon = "rocket"
launcher_position = "start"
pinned = [ "helium", "dev.zed.Zed" ]
reserve_space = false
show_dots = true

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600.0

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = true
    timeout = 900.0

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 660.0

[location]
auto_locate = true

[lockscreen]
blurred_desktop = true

[lockscreen_widgets]
enabled = true
schema_version = 1
widget_order = [
    "lockscreen-login-box@DP-1",
    "lockscreen-login-box@HDMI-A-1",
    "lockscreen-widget-0000000000000001",
    "lockscreen-widget-0000000000000002",
    "lockscreen-widget-0000000000000003"
]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 1024.0
    cy = 1037.0
    output = "DP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-1".settings]
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 960.0
    cy = 957.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1".settings]
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000001]
    box_height = 0.0
    box_width = 0.0
    cx = 1819.0
    cy = 195.0
    output = "DP-1"
    rotation = 0.0
    type = "clock"

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000002]
    box_height = 0.0
    box_width = 0.0
    cx = 1812.0
    cy = 318.0
    output = "DP-1"
    rotation = 0.0
    type = "weather"

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000003]
    box_height = 0.0
    box_width = 0.0
    cx = 1805.0
    cy = 1014.0
    output = "DP-1"
    rotation = 0.0
    type = "media_player"

[nightlight]
enabled = true

[notification]
layer = "overlay"

[osd]
position = "bottom_center"

[plugins]
enabled = [ "noctalia/bongocat" ]

[shell]
avatar_path = "/home/mono/.avatar.webp"
polkit_agent = true
screen_time_enabled = true
settings_show_advanced = true
telemetry_enabled = true

    [shell.greeter_sync]
    auto_sync = true

    [shell.launcher]
    app_grid = true

    [shell.panel]
    open_near_click_control_center = true
    transparency_mode = "glass"

    [shell.screen_corners]
    enabled = true

    [shell.screenshot]
    confirm_region = true

    [[shell.session.actions]]
    action = "lock"
    countdown_seconds = 0.0
    enabled = true
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    countdown_seconds = 0.0
    enabled = true
    variant = "default"

    [[shell.session.actions]]
    action = "lock_and_suspend"
    countdown_seconds = 0.0
    enabled = true
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    countdown_seconds = 0.0
    enabled = true
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    countdown_seconds = 0.0
    enabled = true
    variant = "destructive"

[theme]
builtin = "Ayu"
source = "wallpaper"

    [theme.templates]
    enable_builtin_templates = false
    enable_community_templates = false

[wallpaper]
directory = "/home/mono/.config/niri/assets"

    [wallpaper.default]
    path = "/home/mono/.config/niri/assets/wallpaper.jpg"

    [wallpaper.last]
    path = "/home/mono/.config/niri/assets/wallpaper.jpg"

[widget.Overview]
command = "niri msg action toggle-overview"
glyph = "rectangle"
scroll_down_command = "niri msg action focus-column-right"
scroll_up_command = "niri msg action focus-column-left"
type = "custom_button"

[widget.active_window]
title_scroll = "on_hover"

[widget.cat]
type = "noctalia/bongocat:cat"

[widget.clock]
anchor = true

[widget.network]
show_label = false

[widget.session]
capsule = true

[widget.tray]
drawer = true
drawer_columns = 5
match_adjacent_spacing = true
pinned = [ "Fcitx", "Vesktop", "steam" ]

[widget.workspaces]
display = "none"
hide_when_empty = true