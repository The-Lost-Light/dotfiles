[audio]
enable_sounds = true

[backdrop]
blur_intensity = 0.19999999552965164
enabled = true

[bar.default]
auto_hide = true
capsule = true
center = [ "media", "clock", "session" ]
contact_shadow = true
end = [ "tray", "network", "bluetooth", "volume", "battery", "clipboard", "notifications" ]
layer = "overlay"
reserve_space = false
start = [ "workspaces", "Overview", "active_window" ]

[brightness]
enable_ddcutil = true

[calendar]
enabled = true

[control_center]
sidebar = "full"

